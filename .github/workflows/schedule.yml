name: financial-bot
on:
  schedule:
  # 台灣時間週一至週五 09:00 - 13:00 每小時7分時自動開機執行
    - cron: "7 9-13 * * 1-5"
      timezone: "Asia/Taipei"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-report:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        # GitHub Actions 的「臨時機器人帳密」

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: pip

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Execute Financial Monitor
      run: python main.py
      env:
        # GMAIL_USER: ${{ secrets.GMAIL_USER }}
        # GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        # RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        # 來自 Variables
        WEB_URL: ${{ vars.WEB_URL }}

    - name: Commit state
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add stock_state.json news_state.json index.html
        git diff --cached --quiet || git commit -m "Update state"
        git push

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: .

  deploy-pages:
    needs: generate-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    permissions:
      pages: write
      id-token: write

    steps:
    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
      